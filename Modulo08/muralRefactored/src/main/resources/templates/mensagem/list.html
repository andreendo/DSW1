<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mural</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>CRUD Mensagens</h1>
<ul>
    <li><a th:href="@{/}">Home</a></li>
    <li><a th:href="@{/mensagem/create}">Nova Mensagem</a></li>
</ul>
<br>
<div th:if="${success}" th:text="${success}" class="success-message"></div>
<div th:if="${#lists.isEmpty(messages)}">
    <p>Sem mensagens.</p>
</div>
<div th:unless="${#lists.isEmpty(messages)}">
    <h4 th:text="${'Número de mensagens: ' + messages.size()}"></h4>
    <div th:each="msg : ${messages}">
        <div>
            | <a th:href="@{/mensagem/edit/{id}(id=${msg.id()})}">update</a> | <a th:href="@{/mensagem/delete/{id}(id=${msg.id()})}">delete</a> |
            <strong>De:</strong> <span th:text="${msg.from()}"></span>
            &nbsp;
            <strong>Para:</strong> <span th:text="${msg.to()}"></span>
            (em <span th:text="${msg.timestamp()}"></span>) - <span th:text="${msg.message()}"></span>
        </div>
    </div>
</div>

</body>
</html>
