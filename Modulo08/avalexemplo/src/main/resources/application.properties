spring.application.name=avalexemplo

# MySQL
spring.datasource.url = jdbc:mysql://localhost:3306/avalexemplo2026
spring.datasource.username = root
spring.datasource.password = root

# JPA
spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true
spring.jpa.open-in-view = true
spring.jpa.hibernate.naming.physical-strategy = org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# THYMELEAF
spring.thymeleaf.cache = false

# Internatiolization
# Base name of the files (messages, messages_pt, etc.)
spring.messages.basename=messages
spring.messages.encoding=UTF-8
# Keep it true to fall back to messages.properties if a key is missing in a specific locale
spring.messages.fallback-to-system-locale=true