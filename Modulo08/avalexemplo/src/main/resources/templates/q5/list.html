<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1 th:text="#{welcome.list_of_categories}">Lista de Categorias</h1>
    | <a th:href="@{/}">Index</a> | <a th:href="@{/q5/add}" th:text="#{form.add_category}">Adicionar Categoria</a> |
    <br/>
    <br/>
    <th:block if="${message != null}">
        <div style="color: blue" th:text="${message}"></div>
        <br />
    </th:block>
    <table border="1" style="width: 80%; text-align: left; border-collapse: collapse;">
        <thead style="background-color: #f2f2f2;">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Priority</th>
                <th>Topics</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="category : ${categories}">
                <td th:text="${category.id}"></td>
                <td th:text="${category.name}"></td>
                <td th:text="${category.priority}"></td>
                <td th:text="${category.topics}"></td>
                <td>
                    <a th:href="@{/q5/edit(id=${category.id})}">edit</a> | <a th:href="@{/q5/delete(id=${category.id})}">delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
