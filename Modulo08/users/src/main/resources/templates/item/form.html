<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Users App</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">New Item</h5>
            <a th:href="@{/logout}" class="btn btn-success btn-sm">Logout</a>
        </div>
        <div class="card-body">
            <p>Logged User: <span th:text="${#authentication.name}">Username</span></p>

            <form th:action="@{/item/save}" th:object="${item}" method="post">
                <div class="mb-3">
                    <label for="name" class="form-label fw-bold">Name*</label>
                    <input class="form-control" placeholder="e.g. PC Dell"
                           th:errorclass="is-invalid" type="text" th:field="*{name}" />
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label fw-bold">Description*</label>
                    <textarea
                           class="form-control" placeholder="e.g. Some detailed description here"
                           rows="3"
                           th:errorclass="is-invalid"
                           th:field="*{description}"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">
                        Description is too short.
                    </div>
                </div>
                <input type="submit" value="Save" class="btn btn-primary">
            </form>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
